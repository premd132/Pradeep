<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajdhani Pro AI – The AI Powered 2+2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
 --gold:#ffd700; --red:#ff4757; --blue:#2e86de;
 --bg:#0f172a; --panel:#1e293b;
}
*{box-sizing:border-box;font-family:Poppins}
body{margin:0;background:var(--bg);color:#fff}

#home{
 height:100vh;display:flex;flex-direction:column;
 justify-content:center;align-items:center;text-align:center
}
#home h1{color:var(--gold);font-size:3rem}
#home button{
 background:var(--gold);border:none;padding:14px 40px;
 border-radius:40px;font-weight:800;font-size:1.1rem
}

#app{display:none;padding:15px}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.toolbar button{
 background:#444;color:#fff;border:none;
 padding:8px 14px;border-radius:6px;font-weight:600
}

.table-box{
 position:relative;background:#fff;border-radius:10px;padding:5px
}
table{border-collapse:collapse;color:#000}
td,th{
 border:1px solid #ddd;
 width:45px;height:45px;
 text-align:center;font-weight:700
}
th{background:#1e293b;color:#fff;font-size:11px}

.circle-red{
 border:3px solid var(--red)!important;
 border-radius:50%;background:rgba(255,71,87,.2)
}
.circle-blue{
 border:3px solid var(--blue)!important;
 border-radius:50%;background:rgba(46,134,222,.2)
}

canvas{position:absolute;top:0;left:0;pointer-events:none}

.card{
 background:var(--panel);padding:12px;border-radius:10px;
 border-top:3px solid var(--gold)
}
</style>
</head>

<body>

<div id="home">
 <h1>Rajdhani PRO AI</h1>
 <p>The AI Powered 2+2 SYSTEM</p>
 <button onclick="start()">START</button>
</div>

<div id="app">
 <div class="toolbar">
  <input type="file" id="csvFile" accept=".csv" style="display:none">
  <button onclick="csvFile.click()">📂 CSV UPLOAD</button>
  <button onclick="downloadCSV()">💾 CSV SAVE</button>
  <button onclick="addRow()">➕ ADD ROW</button>
  <button onclick="location.reload()">🔄 RESET</button>
 </div>

 <center>
 <div class="table-box">
  <canvas id="mainCanvas"></canvas>
  <table id="tbl"></table>
 </div>
 </center>

 <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px">
  <div class="card"><b>✔ Check Lines</b><div id="checks"></div></div>
  <div class="card"><b>🔮 Prediction</b><div id="future">—</div></div>
 </div>
</div>

<script>
/* ===== DOM ===== */
const home = document.getElementById("home");
const app = document.getElementById("app");
const tbl = document.getElementById("tbl");
const mainCanvas = document.getElementById("mainCanvas");
const csvFile = document.getElementById("csvFile");

/* ===== FAMILY ===== */
const FAMILY={
"12":["12","17","21","26","62","67","71","76"],
"13":["13","18","31","36","63","68","81","86"],
"14":["14","19","41","46","64","69","91","96"],
"15":["01","06","10","15","51","56","60","65"],
"23":["23","28","32","37","73","78","82","87"],
"24":["24","29","42","47","74","79","92","97"],
"25":["02","07","20","25","52","57","70","75"],
"34":["34","39","43","48","84","89","93","98"],
"35":["03","08","30","35","53","58","80","85"],
"45":["04","09","40","45","54","59","90","95"]
};

let data = Array(10).fill().map(()=>Array(5).fill("**"));
let activeMark=null;

/* ===== UTILS ===== */
function fam(v){
 for(let k in FAMILY) if(FAMILY[k].includes(v)) return k;
 return "NA";
}
function norm(v){
 if(!v||v=="**")return"**";
 v=String(v); return v.length==1?"0"+v:v;
}

/* ===== START ===== */
function start(){
 home.style.display="none";
 app.style.display="block";
 draw();
}

/* ===== DRAW ===== */
function draw(){
 let h="<tr><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th></tr>";
 data.forEach((r,i)=>{
  h+="<tr>";
  r.forEach((c,j)=>{
   let cls="";
   if(activeMark){
    let t=activeMark.map[i]?.[j];
    if(t==1)cls="circle-red";
    if(t==2)cls="circle-blue";
   }
   h+=`<td class="${cls}" contenteditable
    oninput="data[${i}][${j}]=norm(this.innerText)"
    onclick="makePattern(${i},${j})">${c}</td>`;
  });
  h+="</tr>";
 });
 tbl.innerHTML=h;
 drawLines();
}

/* ===== 2+2 AI ===== */
function makePattern(r,c){
 if(data[r][c] !== "**") return;

 let b1=null,b2=null;
 let order1=[],order2=[];
 let map=Array(data.length).fill().map(()=>Array(5).fill(0));

 for(let i=r-1;i>=0;i--){
  let v=data[i][c];
  if(v!="**"){
   let f=fam(v);
   if(!b1) b1=f;
   else if(!b2 && f!=b1){b2=f;break;}
  }
 }
 if(!b1||!b2){alert("2 alag family nahi mili");return;}

 let c1=0,c2=0;
 for(let i=r-1;i>=0;i--){
  for(let j=0;j<5;j++){
   let f=fam(data[i][j]);
   if(f==b1 && c1<2){
    map[i][j]=1; order1.push({r:i,c:j}); c1++;
   }
   else if(f==b2 && c2<2){
    map[i][j]=2; order2.push({r:i,c:j}); c2++;
   }
  }
  if(c1==2 && c2==2) break;
 }

 if(c1!=2||c2!=2){alert("Exact 2+2 nahi bana");return;}
 activeMark={map,order1,order2};
 draw();
}

/* ===== CANVAS ===== */
function drawLines(){
 const ctx=mainCanvas.getContext("2d");
 mainCanvas.width=tbl.offsetWidth;
 mainCanvas.height=tbl.offsetHeight;
 ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height);
 if(!activeMark)return;
 const rect=tbl.getBoundingClientRect();

 function draw(arr,col){
  if(arr.length<2)return;
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.beginPath();
  arr.forEach((p,i)=>{
   let cell=tbl.rows[p.r].cells[p.c];
   let r=cell.getBoundingClientRect();
   let x=r.left-rect.left+r.width/2;
   let y=r.top-rect.top+r.height/2;
   i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });
  ctx.stroke();
 }
 draw(activeMark.order1,"#ff4757");
 draw(activeMark.order2,"#2e86de");
}

/* ===== CSV ===== */
csvFile.onchange=e=>{
 let f=e.target.files[0]; if(!f)return;
 let r=new FileReader();
 r.onload=()=>{
  data=r.result.split("\n").filter(x=>x.trim())
   .map(x=>x.split(",").slice(0,5).map(v=>norm(v.trim())));
  activeMark=null; draw();
 };
 r.readAsText(f);
}

function downloadCSV(){
 let csv=data.map(r=>r.join(",")).join("\n");
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
 a.download="rajdhani_ai.csv"; a.click();
}

function addRow(){
 data.push(["**","**","**","**","**"]);
 draw();
}
</script>
</body>
</html>
